# AegisShield Minecraft profile.

thresholds:
  udp_pps: 500
  syn_flood: 3000
  icmp_pps: 30
  dns_response_size: 512

fragment_policy: 1
conntrack_enabled: true

blocklist: []

acl_rules:
  - priority: 0
    protocol: tcp
    dst_port: 25565
    action: allow
  - priority: 1
    protocol: tcp
    dst_port: 22
    action: allow
  - priority: 2
    protocol: tcp
    dst_port: 2222
    action: allow
  - priority: 3
    protocol: udp
    dst_port: 25565
    action: allow
  - priority: 5
    protocol: udp
    dst_port: 53
    action: allow
  - priority: 6
    protocol: icmp
    action: allow
  - priority: 7
    protocol: tcp
    dst_port: 8123
    action: allow
  - priority: 8
    protocol: tcp
    dst_port: 8080
    action: allow

minecraft:
  enabled: true
  server_port: 25565
  max_conn_rate: 5
  max_ping_rate: 3

control_plane:
  api_listen: "127.0.0.1:9090"
  metrics_listen: "127.0.0.1:9100"
  cooldown_seconds: 120
  auto_block_duration: 600
  expose_remote: false
  auth_token: ""
  allowed_origins: []
  allowed_cidrs:
    - "127.0.0.1/32"

alerts:
  discord_webhook: ""
  telegram_bot_token: ""
  telegram_chat_id: ""

bgp:
  enabled: false
  experimental: false
  local_asn: 0
  router_id: "0.0.0.0"
  anycast_prefix: ""

tunnel:
  enabled: false
  experimental: false
  type: "gre"
  local_ip: ""
  remote_ip: ""
  interface_name: "aegis0"
  mtu: 1476
  keepalive_interval: 10

logging:
  level: "info"
  output: "file"
  file_path: "/var/log/aegisshield/minecraft.log"
