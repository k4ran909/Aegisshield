# AegisShield master configuration (secure defaults).

thresholds:
  udp_pps: 1000
  syn_flood: 5000
  icmp_pps: 50
  dns_response_size: 512

# XDP behavior flags
# fragment_policy: 0=disabled, 1=drop-all (default), 2=selective
fragment_policy: 1
conntrack_enabled: true

blocklist: []

# Lower number = higher priority.
acl_rules:
  - priority: 10
    protocol: tcp
    dst_port: 22
    action: allow
  - priority: 20
    protocol: tcp
    dst_port: 443
    action: allow
  - priority: 30
    protocol: tcp
    dst_port: 80
    action: allow
  - priority: 100
    protocol: tcp
    dst_port: 25565
    action: allow
  - priority: 200
    protocol: udp
    dst_port: 19132
    action: allow

control_plane:
  api_listen: "127.0.0.1:9090"
  metrics_listen: "127.0.0.1:9100"
  cooldown_seconds: 60
  auto_block_duration: 300
  expose_remote: false
  auth_token: ""
  allowed_origins: []
  allowed_cidrs:
    - "127.0.0.1/32"

alerts:
  discord_webhook: ""
  telegram_bot_token: ""
  telegram_chat_id: ""

minecraft:
  enabled: true
  server_port: 25565
  max_conn_rate: 10
  max_ping_rate: 5

bgp:
  enabled: false
  experimental: false
  local_asn: 0
  router_id: "0.0.0.0"
  anycast_prefix: ""

tunnel:
  enabled: false
  experimental: false
  type: "gre"
  local_ip: ""
  remote_ip: ""
  interface_name: "aegis0"
  mtu: 1476
  keepalive_interval: 10

logging:
  level: "info"
  output: "stdout"
  file_path: "/var/log/aegis.log"
