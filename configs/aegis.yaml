# AegisShield master configuration — hardened for production.
# Tuned for real-world botnet DDoS mitigation.

thresholds:
  # Per-source-IP UDP packets per second before dropping.
  # Lower = more aggressive. Set 500 for game servers, 200 for web-only.
  udp_pps: 500

  # Global SYN packets per second before flood mode activates.
  # This is per-CPU, so real threshold ≈ value × num_cores.
  syn_flood: 2000

  # Per-source-IP ICMP echo requests per second.
  icmp_pps: 20

  # Maximum DNS response size (bytes). Anything larger = amplification.
  dns_response_size: 512

# XDP behavior flags
# fragment_policy: 0=disabled, 1=drop-all (default, safest), 2=selective
fragment_policy: 1
conntrack_enabled: true

# Static IP blocklist (permanent bans).
blocklist: []

# Edge Network Firewall ACL rules.
# Lower priority number = evaluated first. First match wins.
acl_rules:
  # Allow SSH — CRITICAL: never remove this or you lose access!
  - priority: 1
    protocol: tcp
    dst_port: 22
    action: allow

  # Allow HTTPS
  - priority: 10
    protocol: tcp
    dst_port: 443
    action: allow

  # Allow HTTP
  - priority: 20
    protocol: tcp
    dst_port: 80
    action: allow

  # Allow Minecraft Java
  - priority: 100
    protocol: tcp
    dst_port: 25565
    action: allow

  # Allow Minecraft Bedrock
  - priority: 200
    protocol: udp
    dst_port: 19132
    action: allow

  # Allow DNS outbound responses
  - priority: 210
    protocol: udp
    dst_port: 53
    action: allow

control_plane:
  api_listen: "0.0.0.0:9090"
  metrics_listen: "0.0.0.0:9100"
  cooldown_seconds: 60
  auto_block_duration: 300
  expose_remote: false
  auth_token: ""
  allowed_origins: []
  allowed_cidrs:
    - "0.0.0.0/0"

alerts:
  discord_webhook: ""
  telegram_bot_token: ""
  telegram_chat_id: ""

minecraft:
  enabled: true
  server_port: 25565
  max_conn_rate: 10
  max_ping_rate: 5

bgp:
  enabled: false
  experimental: false
  local_asn: 0
  router_id: "0.0.0.0"
  anycast_prefix: ""

tunnel:
  enabled: false
  experimental: false
  type: "gre"
  local_ip: ""
  remote_ip: ""
  interface_name: "aegis0"
  mtu: 1476
  keepalive_interval: 10

logging:
  level: "info"
  output: "stdout"
  file_path: "/var/log/aegis.log"
