# AegisShield — Nginx L7 DDoS Protection
# Drop this file into /etc/nginx/conf.d/ or include from nginx.conf
#
# Defends against: GET, POST, STRESS, SLOW (Slowloris), HEAD, NULL,
# COOKIE, PPS, EVEN, APACHE, XMLRPC, BOT, BYPASS, BOMB, KILLER, DYN

# ═══════════════════════════════════════════════════════════════════
# Rate Limiting Zones
# ═══════════════════════════════════════════════════════════════════

# Per-IP request rate limit (10 req/s, burst 20)
limit_req_zone $binary_remote_addr zone=req_limit:10m rate=10r/s;

# Per-IP connection limit
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Per-IP rate limit for POST requests (stricter: 5 req/s)
map $request_method $post_limit_key {
    POST    $binary_remote_addr;
    default "";
}
limit_req_zone $post_limit_key zone=post_limit:10m rate=5r/s;

# ═══════════════════════════════════════════════════════════════════
# Blocked User-Agents (BOT, NULL attacks)
# ═══════════════════════════════════════════════════════════════════

map $http_user_agent $bad_agent {
    default                 0;
    ""                      1;  # NULL attack — empty UA
    "~*python"              1;  # MHDDoS / scripted attacks
    "~*curl"                1;  # curl-based floods
    "~*wget"                1;  # wget-based floods
    "~*httpclient"          1;  # Java HTTP clients
    "~*libwww"              1;  # Perl LWP
    "~*Go-http-client"      1;  # Go HTTP floods
    "~*bombardier"          1;  # BOMB attack tool
    "~*wrk"                 1;  # HTTP benchmark tool
    "~*siege"               1;  # HTTP benchmark tool
    "~*apache-bench"        1;  # ab benchmark tool
    "~*vegeta"              1;  # Load testing tool
    "~*nikto"               1;  # Vulnerability scanner
    "~*sqlmap"              1;  # SQL injection scanner
    "~*nmap"                1;  # Port scanner
    "~*masscan"             1;  # Mass scanner
}

# ═══════════════════════════════════════════════════════════════════
# Server Configuration
# ═══════════════════════════════════════════════════════════════════

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # ── Slowloris Protection ──────────────────────────────────
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 15s;
    send_timeout 10s;

    # ── Request Size Limits (STRESS attack) ───────────────────
    client_max_body_size 10M;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    # ── Connection Limits ─────────────────────────────────────
    limit_conn conn_limit 50;
    limit_conn_status 429;

    # ── Request Rate Limits ───────────────────────────────────
    limit_req zone=req_limit burst=20 nodelay;
    limit_req zone=post_limit burst=10 nodelay;
    limit_req_status 429;

    # ── Block Bad User-Agents (BOT, NULL, BOMB) ───────────────
    if ($bad_agent) {
        return 444;  # Close connection with no response
    }

    # ── Block WordPress XML-RPC Exploit ───────────────────────
    location = /xmlrpc.php {
        deny all;
        return 444;
    }

    # ── Block Common Exploit Paths ────────────────────────────
    location ~* \.(env|git|svn|htaccess|htpasswd|bak|old|backup|sql|db)$ {
        deny all;
        return 444;
    }

    # ── Block Apache Range Header Exploit ─────────────────────
    if ($http_range ~* "bytes=0-,") {
        return 444;
    }

    # ── Security Headers ──────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Proxy to Your Application ──────────────────────────────
    # Change this to your actual backend (e.g., localhost:3000)
    location / {
        # Rate limiting applies here
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Backend timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 30s;

        # Buffer settings (prevent DOWNLOADER slow-read)
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ── Custom Error Pages ─────────────────────────────────────
    error_page 429 /429.html;
    location = /429.html {
        internal;
        default_type text/html;
        return 429 '<html><body><h1>429 Too Many Requests</h1><p>Rate limit exceeded. Try again later.</p></body></html>';
    }
}
