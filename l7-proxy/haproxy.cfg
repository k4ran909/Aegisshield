# ═══════════════════════════════════════════════════════════════════
# AegisShield HAProxy Configuration
# L7 DDoS Protection — TLS Termination, Rate Limiting, JA4+
# ═══════════════════════════════════════════════════════════════════

global
    # Maximum connections across all frontends
    maxconn 50000

    # Logging
    log stdout format raw local0

    # Security: run as non-root after binding
    # user haproxy
    # group haproxy
    # chroot /var/lib/haproxy

    # TLS tuning
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    ssl-default-bind-options prefer-client-ciphers no-sslv3 no-tlsv10 no-tlsv11
    tune.ssl.default-dh-param 2048

    # HTTP/2 settings
    tune.h2.max-concurrent-streams 100
    tune.h2.initial-window-size 65535

    # Load Lua modules for advanced defense
    lua-load /etc/haproxy/lua/rate_limiter.lua
    lua-load /etc/haproxy/lua/ja4_fingerprint.lua
    lua-load /etc/haproxy/lua/http2_shield.lua

defaults
    mode http
    log global
    option httplog
    option dontlognull
    option http-server-close
    option forwardfor except 127.0.0.0/8

    # Timeouts — tuned for DDoS resilience
    timeout connect 5s
    timeout client 30s
    timeout server 30s
    timeout http-request 10s       # Slowloris defense
    timeout http-keep-alive 10s
    timeout queue 30s
    timeout tarpit 60s

    # Retry policy
    retries 3
    option redispatch

# ═══════════════════════════════════════════════════════════════════
# FRONTEND: HTTPS (port 443)
# ═══════════════════════════════════════════════════════════════════
frontend ft_https
    bind *:443 ssl crt /etc/haproxy/certs/server.pem alpn h2,http/1.1
    bind *:80

    # ── HTTP/2 Rapid Reset Defense ────────────────────────────────
    # Track RST_STREAM rate per connection
    # If a client sends too many resets, force GOAWAY
    # This is handled by the http2_shield Lua module

    # ── Stick Tables for Rate Limiting ────────────────────────────
    # Track per-IP request rate (sliding window)
    stick-table type ip size 200k expire 30s store http_req_rate(10s),conn_cur,conn_rate(10s),gpc0

    # Mark client IP for rate tracking
    http-request track-sc0 src
    http-request lua.check_rate_limit
    http-request lua.check_ja4_fingerprint
    http-request lua.check_http2_abuse

    acl ja4_blocked var(txn.aegis_ja4_blocked) -m bool
    acl h2_abuse var(txn.aegis_h2_abuse) -m bool
    http-request deny deny_status 403 if ja4_blocked
    http-request deny deny_status 429 if h2_abuse

    # ── Rate Limiting Rules ───────────────────────────────────────
    # Block if more than 100 requests in 10 seconds
    http-request deny deny_status 429 if { sc_http_req_rate(0) gt 100 }

    # Block if more than 20 concurrent connections from same IP
    http-request deny deny_status 429 if { sc_conn_cur(0) gt 20 }

    # Block if connection rate exceeds 30/10s
    http-request deny deny_status 429 if { sc_conn_rate(0) gt 30 }

    # ── JA4+ TLS Fingerprint Check ────────────────────────────────
    # The ja4_fingerprint Lua module computes the JA4+ hash and
    # compares against known botnet signatures.

    # ── Security Headers ──────────────────────────────────────────
    http-response set-header X-Content-Type-Options nosniff
    http-response set-header X-Frame-Options DENY
    http-response set-header X-XSS-Protection "1; mode=block"
    http-response set-header Referrer-Policy strict-origin-when-cross-origin

    # ── Forwarding ────────────────────────────────────────────────
    # Add original client IP for the backend
    http-request set-header X-Real-IP %[src]
    http-request set-header X-Forwarded-Proto %[ssl_fc,iif(https,http)]

    # Route to backend
    default_backend bk_origin

# ═══════════════════════════════════════════════════════════════════
# FRONTEND: Minecraft TCP Proxy (port 25565)
# ═══════════════════════════════════════════════════════════════════
frontend ft_minecraft
    mode tcp
    bind *:25565

    # TCP-level stick table for Minecraft connection rate limiting
    stick-table type ip size 100k expire 60s store conn_cur,conn_rate(10s)
    tcp-request connection track-sc0 src

    # Block IPs with too many concurrent MC connections
    tcp-request connection reject if { sc_conn_cur(0) gt 5 }

    # Block IPs connecting too fast (bot flood)
    tcp-request connection reject if { sc_conn_rate(0) gt 20 }

    # Forward to MC server
    default_backend bk_minecraft

# ═══════════════════════════════════════════════════════════════════
# BACKEND: Origin Web Server
# ═══════════════════════════════════════════════════════════════════
backend bk_origin
    balance roundrobin

    # Health checking
    option httpchk GET /health
    http-check expect status 200

    # Origin server (adjust IP and port)
    server origin1 127.0.0.1:8080 check inter 5s fall 3 rise 2

# ═══════════════════════════════════════════════════════════════════
# BACKEND: Minecraft Server
# ═══════════════════════════════════════════════════════════════════
backend bk_minecraft
    mode tcp
    balance roundrobin

    # TCP health checking
    option tcp-check

    # Send PROXY protocol v2 for correct client IP resolution
    # (requires Velocity/BungeeCord to accept PROXY protocol)
    # server mc1 127.0.0.1:25566 check send-proxy-v2

    # Standard TCP forwarding (no PROXY protocol)
    server mc1 127.0.0.1:25566 check inter 5s fall 3 rise 2

# ═══════════════════════════════════════════════════════════════════
# STATS: HAProxy Statistics Dashboard
# ═══════════════════════════════════════════════════════════════════
frontend ft_stats
    bind 127.0.0.1:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 5s
    stats show-legends
    stats auth admin:change-me
    stats admin if { src 127.0.0.1/32 }
