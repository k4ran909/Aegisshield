name: CI

on:
  push:
  pull_request:

jobs:
  go-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
      - name: Download Go modules
        run: go mod download
      - name: Run Go tests
        run: go test ./...

  rust-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: data-plane
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
      - name: Rust fmt check
        run: cargo fmt --all -- --check
      - name: Rust clippy
        run: cargo clippy -p aegis-common -p aegis-userspace -- -D warnings
      - name: Rust check
        run: cargo check -p aegis-common -p aegis-userspace
